<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gen AI 활용과정 FAQ 챗봇</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0a1a;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* ── Background (OT 스타일) ── */
  .bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 30%, #0d1b2a 60%, #0a0a1a 100%);
    z-index: -3;
  }
  .bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(100, 140, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 140, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: -2;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
    animation: orbPulse 8s ease-in-out infinite alternate;
  }
  .orb-1 { width: 400px; height: 400px; background: rgba(56, 96, 255, 0.12); top: -100px; right: -100px; }
  .orb-2 { width: 350px; height: 350px; background: rgba(139, 92, 246, 0.1); bottom: -50px; left: -50px; animation-delay: -4s; }
  .orb-3 { width: 250px; height: 250px; background: rgba(6, 182, 212, 0.08); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; }
  @keyframes orbPulse {
    0% { opacity: 0.5; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Chat Container ── */
  .chat-container {
    width: 460px;
    height: 720px;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.4), 0 0 40px rgba(56, 96, 255, 0.08);
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .chat-header {
    background: linear-gradient(135deg, rgba(56, 96, 255, 0.2), rgba(139, 92, 246, 0.2));
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .chat-header .avatar {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #3860ff, #8b5cf6);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(56, 96, 255, 0.3);
  }
  .chat-header .info h2 {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #a0bfff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .chat-header .info p {
    font-size: 12px;
    color: rgba(160, 190, 255, 0.7);
    margin-top: 3px;
    font-weight: 400;
  }

  /* ── 카테고리 탭 ── */
  .category-bar-wrapper {
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.15);
  }
  .category-bar {
    padding: 10px 36px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scroll-behavior: smooth;
  }
  .category-bar::-webkit-scrollbar { height: 0; }
  .cat-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(20, 24, 40, 0.85);
    color: rgba(200, 210, 240, 0.7);
    font-size: 14px;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .cat-arrow:hover {
    background: rgba(56, 96, 255, 0.25);
    border-color: rgba(100, 140, 255, 0.4);
    color: #a0bfff;
  }
  .cat-arrow.left { left: 4px; }
  .cat-arrow.right { right: 4px; }

  .cat-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: rgba(200, 210, 240, 0.6);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .cat-btn:hover {
    border-color: rgba(100, 140, 255, 0.4);
    color: #a0bfff;
    background: rgba(56, 96, 255, 0.1);
  }
  .cat-btn.active {
    background: linear-gradient(135deg, #3860ff, #5b8cff);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 0 12px rgba(56, 96, 255, 0.3);
  }

  /* ── 메시지 영역 ── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(100, 140, 255, 0.2); border-radius: 4px; }

  /* ── 빈 화면 안내 ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
  }
  .empty-state .icon { font-size: 48px; }
  .empty-state .title {
    font-size: 15px;
    font-weight: 600;
    background: linear-gradient(135deg, #fff, #a0bfff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .empty-state .desc {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(160, 190, 255, 0.5);
  }

  /* ── 메시지 버블 ── */
  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    word-break: keep-all;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot {
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(220, 225, 245, 0.9);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .message.user {
    background: linear-gradient(135deg, #3860ff, #5b8cff);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(56, 96, 255, 0.25);
  }
  .message.bot strong { color: #a0bfff; }

  /* ── FAQ 버튼 리스트 ── */
  .faq-buttons {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }
  .faq-btn {
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    color: rgba(200, 210, 240, 0.7);
    line-height: 1.4;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .faq-btn:hover {
    border-color: rgba(100, 140, 255, 0.4);
    background: rgba(56, 96, 255, 0.1);
    color: #a0bfff;
  }

  .freq-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    margin-right: 6px;
    font-weight: 600;
  }
  .freq-high { background: rgba(56, 96, 255, 0.2); color: #7ba4ff; }
  .freq-mid { background: rgba(139, 92, 246, 0.2); color: #b49dfa; }
  .freq-low { background: rgba(6, 182, 212, 0.2); color: #5dd8e8; }

  /* ── 입력 영역 ── */
  .chat-input {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 8px;
    background: rgba(0,0,0,0.15);
  }
  .chat-input input {
    flex: 1;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .chat-input input::placeholder { color: rgba(160, 190, 255, 0.35); }
  .chat-input input:focus { border-color: rgba(56, 96, 255, 0.5); background: rgba(255,255,255,0.07); }

  .chat-input button {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #3860ff, #5b8cff);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(56, 96, 255, 0.3);
  }
  .chat-input button:hover { transform: scale(1.05); box-shadow: 0 0 24px rgba(56, 96, 255, 0.4); }
  .chat-input button:active { transform: scale(0.95); }

  /* ── 타이핑 인디케이터 ── */
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 7px; height: 7px;
    background: rgba(100, 140, 255, 0.5);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ===== 관리자 패널 ===== */
  .admin-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .admin-overlay.show { display: flex; }

  .admin-panel {
    width: 500px;
    max-height: 80vh;
    background: linear-gradient(135deg, rgba(20, 20, 50, 0.98), rgba(10, 10, 30, 0.98));
    backdrop-filter: blur(20px);
    border: 1px solid rgba(100, 140, 255, 0.2);
    border-radius: 20px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.4), 0 0 40px rgba(56, 96, 255, 0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .admin-header {
    background: linear-gradient(135deg, rgba(56, 96, 255, 0.15), rgba(139, 92, 246, 0.15));
    border-bottom: 1px solid rgba(100, 140, 255, 0.15);
    color: #fff;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .admin-header h3 { font-size: 15px; font-weight: 700; }
  .admin-header .badge {
    background: linear-gradient(135deg, #3860ff, #5b8cff);
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .admin-close {
    background: none; border: none; color: rgba(200,210,240,0.6); font-size: 20px; cursor: pointer;
    transition: color 0.2s;
  }
  .admin-close:hover { color: #fff; }

  .admin-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .admin-body::-webkit-scrollbar { width: 4px; }
  .admin-body::-webkit-scrollbar-thumb { background: rgba(100, 140, 255, 0.2); border-radius: 4px; }

  .admin-empty {
    text-align: center;
    color: rgba(160, 190, 255, 0.4);
    padding: 40px 20px;
    font-size: 14px;
  }

  .unanswered-item {
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .unanswered-item .q-text {
    flex: 1;
    font-size: 13px;
    color: rgba(220, 225, 245, 0.8);
    line-height: 1.5;
  }
  .unanswered-item .q-time {
    font-size: 11px;
    color: rgba(160, 190, 255, 0.4);
    white-space: nowrap;
  }
  .unanswered-item .q-delete {
    background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 16px;
    transition: color 0.2s;
  }
  .unanswered-item .q-delete:hover { color: #7ba4ff; }

  .admin-actions {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 8px;
  }
  .admin-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-copy {
    background: linear-gradient(135deg, #3860ff, #5b8cff);
    color: #fff;
  }
  .btn-copy:hover { box-shadow: 0 0 16px rgba(56, 96, 255, 0.3); }
  .btn-clear {
    background: rgba(255,255,255,0.06);
    color: rgba(200, 210, 240, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-clear:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .copy-toast {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #3860ff, #5b8cff);
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(56, 96, 255, 0.3);
  }

  .admin-guide {
    padding: 12px 16px;
    background: linear-gradient(135deg, rgba(56, 96, 255, 0.08), rgba(139, 92, 246, 0.06));
    border-bottom: 1px solid rgba(100, 140, 255, 0.1);
    font-size: 12px;
    color: rgba(160, 190, 255, 0.6);
    line-height: 1.6;
  }
  .admin-guide strong { color: rgba(160, 190, 255, 0.9); }
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>Gen AI 활용과정 FAQ</h2>
      <p>KT AI Campus 교육 도우미</p>
    </div>
  </div>

  <div class="category-bar-wrapper">
    <button class="cat-arrow left" id="catArrowLeft">◀</button>
    <div class="category-bar" id="categoryBar">
      <button class="cat-btn active" data-cat="all">전체</button>
      <button class="cat-btn" data-cat="프롬프트 작성 기본">프롬프트 기본</button>
      <button class="cat-btn" data-cat="이미지생성 C.A.S.T">이미지 생성</button>
      <button class="cat-btn" data-cat="저작권">저작권</button>
      <button class="cat-btn" data-cat="툴">툴</button>
      <button class="cat-btn" data-cat="보고서 작성">보고서</button>
      <button class="cat-btn" data-cat="데이터분석 및 시각화">데이터분석</button>
      <button class="cat-btn" data-cat="영상 제작">영상 제작</button>
      <button class="cat-btn" data-cat="정보검색 및 리서치">정보검색</button>
      <button class="cat-btn" data-cat="AI 개념 및 트렌드">AI 개념</button>
      <button class="cat-btn" data-cat="업무 자동화">업무 자동화</button>
    </div>
    <button class="cat-arrow right" id="catArrowRight">▶</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="empty-state" id="emptyState">
      <div class="icon">💬</div>
      <div class="title">궁금한 내용을 질문해 주세요!</div>
      <div class="desc">교육 과정, 프롬프트 작성 등<br>무엇이든 물어보세요.<br><br>상단 탭을 누르면 카테고리별<br>자주 묻는 질문을 볼 수 있어요.</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="궁금한 내용을 입력하세요..." />
    <button id="sendBtn" onclick="handleSend()">➤</button>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <h3>미답변 질문 관리</h3>
        <span class="badge" id="adminCount">0</span>
      </div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-guide">
      💡 <strong>답변 업데이트 방법:</strong> 아래 리스트를 복사한 후, Claude Code에서 <strong>"챗봇"</strong>이라고 말하고 질문+답변을 전달하면 자동 반영됩니다.
    </div>
    <div class="admin-body" id="adminBody"></div>
    <div class="admin-actions">
      <button class="btn-copy" onclick="copyAll()">클립보드에 복사</button>
      <button class="btn-clear" onclick="clearAll()">전체 삭제</button>
    </div>
  </div>
</div>
<div class="copy-toast" id="copyToast">복사되었습니다!</div>

<script>
const faqData = [
  {
    q: "형식과 명령을 어떻게 구분하나요?",
    a: "• <strong>명령</strong>: 무엇을 할 것인지에 대한 구체적 지시 사항 (예: \"경쟁사 분석을 해라\", \"목차를 만들어라\")<br>• <strong>형식</strong>: 결과물을 어떤 형태로 출력할 것인지 (예: \"표 형태로\", \"번호가 매겨진 목차로\")<br>• 팁: CAST 프레임워크는 형식에 포함되거나 명령에 포함될 수 있습니다",
    tags: ["프롬프트 작성 기본"],
    freq: "상",
    keywords: ["형식", "명령", "구분", "차이", "CAST"]
  },
  {
    q: "프롬프트 입력시 존댓말 VS 반말",
    a: "요즘은 반말과 존댓말이 크게 영향을 미치지 않습니다. 다만 경험적으로:<br>• <strong>반말</strong>: 창의적인 아이디어를 뽑을 때 더 효과적<br>• <strong>존댓말</strong>: 격식 있는 보고서 작성 시 문장력이 더 나은 편<br>• <strong>결론</strong>: 요즘 트렌드는 말투보다 <strong>사용자의 기획력이 더 중요</strong>합니다.",
    tags: ["프롬프트 작성 기본"],
    freq: "하",
    keywords: ["존댓말", "반말", "말투", "경어", "높임말"]
  },
  {

const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');
let currentCategory = 'all';
let conversationStarted = false;

// --- 미답변 질문 관리 (localStorage) ---
function getUnanswered() {
  return JSON.parse(localStorage.getItem('faq_unanswered') || '[]');
}
function saveUnanswered(list) {
  localStorage.setItem('faq_unanswered', JSON.stringify(list));
}
function addUnanswered(question) {
  const list = getUnanswered();
  list.push({ q: question, time: new Date().toLocaleString('ko-KR') });
  saveUnanswered(list);
}

// --- 빈 화면 제거 ---
function clearEmptyState() {
  const el = document.getElementById('emptyState');
  if (el) el.remove();
  conversationStarted = true;
}

function addBotMessage(html) {
  clearEmptyState();
  const div = document.createElement('div');
  div.className = 'message bot';
  div.innerHTML = html;
  chatMessages.appendChild(div);
  scrollToBottom();
}

function addUserMessage(text) {
  clearEmptyState();
  const div = document.createElement('div');
  div.className = 'message user';
  div.textContent = text;
  chatMessages.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chatMessages.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showFaqList(category) {
  const filtered = category === 'all' ? [...faqData] : faqData.filter(f => f.tags.includes(category));
  const freqOrder = { '상': 0, '중': 1, '하': 2 };
  filtered.sort((a, b) => (freqOrder[a.freq] || 2) - (freqOrder[b.freq] || 2));

  const container = document.createElement('div');
  container.className = 'message bot';

  let html = '<div class="faq-buttons">';
  filtered.forEach((faq) => {
    const freqClass = faq.freq === '상' ? 'freq-high' : faq.freq === '중' ? 'freq-mid' : 'freq-low';
    const freqLabel = faq.freq === '상' ? '자주' : faq.freq === '중' ? '보통' : '가끔';
    html += `<button class="faq-btn" onclick="handleFaqClick(${faqData.indexOf(faq)})">
      <span class="freq-badge ${freqClass}">${freqLabel}</span>${faq.q}
    </button>`;
  });
  html += '</div>';

  container.innerHTML = html;
  chatMessages.appendChild(container);
  scrollToBottom();
}

function findBestMatch(query) {
  const normalizedQuery = query.toLowerCase().replace(/\s/g, '');
  let bestScore = 0;
  let bestMatch = null;

  faqData.forEach(faq => {
    let score = 0;
    const normalizedQ = faq.q.toLowerCase().replace(/\s/g, '');

    // 질문 전체가 포함되면 높은 점수
    if (normalizedQ.includes(normalizedQuery) || normalizedQuery.includes(normalizedQ)) {
      score += 15;
    }

    // 키워드 매칭: 매칭된 비율도 반영
    let kwMatched = 0;
    faq.keywords.forEach(kw => {
      if (normalizedQuery.includes(kw.toLowerCase())) {
        score += 3;
        kwMatched++;
      }
    });
    // 키워드 매칭 비율 보너스 (2개 이상 매칭 시)
    if (faq.keywords.length > 0 && kwMatched >= 2) {
      score += (kwMatched / faq.keywords.length) * 5;
    }

    // 질문 텍스트 단어 단위 매칭 (글자 단위 대신)
    const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length >= 2);
    const qWords = faq.q.toLowerCase().split(/\s+/).filter(w => w.length >= 2);
    let wordMatch = 0;
    queryWords.forEach(qw => {
      if (qWords.some(w => w.includes(qw) || qw.includes(w))) wordMatch++;
    });
    if (queryWords.length > 0) {
      score += (wordMatch / queryWords.length) * 4;
    }

    if (score > bestScore) {
      bestScore = score;
      bestMatch = faq;
    }
  });

  return bestScore >= 6 ? bestMatch : null;
}

function handleFaqClick(index) {
  const faq = faqData[index];
  if (!faq) return;
  addUserMessage(faq.q);
  showTyping();
  setTimeout(() => {
    removeTyping();
    addBotMessage(faq.a);
  }, 500);
}

let adminMode = false;

function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;

  // 관리자 암호 입력 대기 상태
  if (adminMode) {
    userInput.value = '';
    userInput.type = 'text';
    userInput.placeholder = '궁금한 내용을 입력하세요...';
    if (text === '0405') {
      adminMode = false;
      addBotMessage("관리자 인증 완료!");
      setTimeout(() => openAdmin(), 400);
    } else {
      adminMode = false;
      addBotMessage("비밀번호가 일치하지 않습니다.");
    }
    return;
  }

  // "관리자" 입력 시 암호 요청
  if (text === '관리자') {
    userInput.value = '';
    clearEmptyState();
    addBotMessage("비밀번호를 입력해 주세요.");
    adminMode = true;
    userInput.type = 'password';
    userInput.placeholder = '비밀번호 입력...';
    userInput.focus();
    return;
  }

  addUserMessage(text);
  userInput.value = '';
  showTyping();

  setTimeout(() => {
    removeTyping();
    const match = findBestMatch(text);

    if (match) {
      addBotMessage(match.a);
    } else {
      addUnanswered(text);
      addBotMessage("앗, 아직 등록되지 않은 질문이에요! 패들렛 Q&A에 질문을 남겨주시면 답변드리고 챗봇에 추후 업데이트 하겠습니다. :)");
    }
  }, 800);
}

function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// --- 카테고리 탭 ---
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;

    chatMessages.innerHTML = '';
    conversationStarted = true;
    const label = btn.textContent;
    addBotMessage(`<strong>${label}</strong> 카테고리의 자주 묻는 질문입니다.`);
    showFaqList(currentCategory);
  });
});

// --- 카테고리 좌우 화살표 ---
document.getElementById('catArrowLeft').addEventListener('click', () => {
  document.getElementById('categoryBar').scrollLeft -= 150;
});
document.getElementById('catArrowRight').addEventListener('click', () => {
  document.getElementById('categoryBar').scrollLeft += 150;
});

// Enter 키 입력
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSend();
});

// ===== 관리자 패널 =====
function openAdmin() {
  const overlay = document.getElementById('adminOverlay');
  overlay.classList.add('show');
  renderAdmin();
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('show');
}

function renderAdmin() {
  const list = getUnanswered();
  const body = document.getElementById('adminBody');
  const count = document.getElementById('adminCount');
  count.textContent = list.length;

  if (list.length === 0) {
    body.innerHTML = '<div class="admin-empty">미답변 질문이 없습니다.</div>';
    return;
  }

  body.innerHTML = list.map((item, i) => `
    <div class="unanswered-item">
      <div>
        <div class="q-text">${item.q}</div>
        <div class="q-time">${item.time}</div>
      </div>
      <button class="q-delete" onclick="deleteOne(${i})" title="삭제">✕</button>
    </div>
  `).join('');
}

function deleteOne(index) {
  const list = getUnanswered();
  list.splice(index, 1);
  saveUnanswered(list);
  renderAdmin();
}

function copyAll() {
  const list = getUnanswered();
  if (list.length === 0) return;

  const text = list.map((item, i) => `${i+1}. [${item.time}] ${item.q}`).join('\n');
  const header = `=== 미답변 질문 리스트 (${list.length}건) ===\n`;
  navigator.clipboard.writeText(header + text).then(() => {
    const toast = document.getElementById('copyToast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);
  });
}

function clearAll() {
  if (confirm('미답변 질문을 모두 삭제하시겠습니까?')) {
    saveUnanswered([]);
    renderAdmin();
  }
}

// 관리자 패널 단축키: Ctrl + Shift + A
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') {
    e.preventDefault();
    openAdmin();
  }
});

// 오버레이 바깥 클릭으로 닫기
document.getElementById('adminOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeAdmin();
});
